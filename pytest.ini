[pytest]
addopts = -s -v --alluredir=allure-results
asyncio_mode = auto
python_files = *_tests.py test_*.py
python_classes = Test*
python_functions = test_*
markers =
    only: Run only tests explicitly marked with @pytest.mark.only.
    template: Базовые шаблонные тесты проекта.
    api: API tests
    e2e: End-to-end tests
    integration: Интеграционные тесты к реальному API (require live API).
    auth: Authentication endpoint tests
    org: Organization endpoint tests
    rbac: Role-based access control tests
    slow: Tests that send many requests (rate limit checks)
    security: Security-focused tests
    live: Tests that require real OAuth tokens / live OAuth flow
    user: User endpoint tests
    smoke: Обязательные тесты — минимальный набор для проверки работоспособности системы.
    regression: Полный регрессионный набор тестов.
    manual_loader: Tests for manual file upload functionality.
