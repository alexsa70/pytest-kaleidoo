name: API Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to test"
        required: true
        default: "qa"
        type: choice
        options: [qa, prod, onprem]
      marker:
        description: "Pytest marker (e.g. smoke, regression)"
        required: false
        default: "integration"
      enable_testmo:
        description: "Submit results to Testmo"
        required: false
        default: false
        type: boolean

jobs:
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install flake8

      - name: Run flake8
        run: flake8 clients/ config/ fixtures/ schema/ tests/ tools/

  run-tests:
    name: API Tests (${{ github.event.inputs.environment || 'qa' }})
    runs-on: ubuntu-latest
    needs: lint

    env:
      ENVIRONMENT: ${{ github.event.inputs.environment || 'qa' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .env (qa)
        if: env.ENVIRONMENT == 'qa'
        run: |
          echo "ENVIRONMENT=qa" >> .env
          echo "API_HTTP_CLIENT.URL=${{ secrets.QA_API_URL }}" >> .env
          echo "API_HTTP_CLIENT.TIMEOUT=30" >> .env
          echo "ORG_NAME=${{ secrets.QA_ORG_NAME }}" >> .env
          echo "AUTH_CREDENTIALS_SUPER_ADMIN.EMAIL=${{ secrets.QA_SUPER_ADMIN_EMAIL }}" >> .env
          echo "AUTH_CREDENTIALS_SUPER_ADMIN.PASSWORD=${{ secrets.QA_SUPER_ADMIN_PASSWORD }}" >> .env
          echo "AUTH_CREDENTIALS_ADMIN.EMAIL=${{ secrets.QA_ADMIN_EMAIL }}" >> .env
          echo "AUTH_CREDENTIALS_ADMIN.PASSWORD=${{ secrets.QA_ADMIN_PASSWORD }}" >> .env
          echo "AUTH_CREDENTIALS_USER.EMAIL=${{ secrets.QA_USER_EMAIL }}" >> .env
          echo "AUTH_CREDENTIALS_USER.PASSWORD=${{ secrets.QA_USER_PASSWORD }}" >> .env
          echo "AUTH_CREDENTIALS.EMAIL=${{ secrets.QA_SUPER_ADMIN_EMAIL }}" >> .env
          echo "AUTH_CREDENTIALS.PASSWORD=${{ secrets.QA_SUPER_ADMIN_PASSWORD }}" >> .env

      - name: Create .env (prod)
        if: env.ENVIRONMENT == 'prod'
        run: |
          echo "ENVIRONMENT=prod" >> .env
          echo "API_HTTP_CLIENT.URL=${{ secrets.PROD_API_URL }}" >> .env
          echo "API_HTTP_CLIENT.TIMEOUT=30" >> .env
          echo "ORG_NAME=${{ secrets.PROD_ORG_NAME }}" >> .env
          echo "AUTH_CREDENTIALS_SUPER_ADMIN.EMAIL=${{ secrets.PROD_SUPER_ADMIN_EMAIL }}" >> .env
          echo "AUTH_CREDENTIALS_SUPER_ADMIN.PASSWORD=${{ secrets.PROD_SUPER_ADMIN_PASSWORD }}" >> .env
          echo "AUTH_CREDENTIALS_ADMIN.EMAIL=${{ secrets.PROD_ADMIN_EMAIL }}" >> .env
          echo "AUTH_CREDENTIALS_ADMIN.PASSWORD=${{ secrets.PROD_ADMIN_PASSWORD }}" >> .env
          echo "AUTH_CREDENTIALS_USER.EMAIL=${{ secrets.PROD_USER_EMAIL }}" >> .env
          echo "AUTH_CREDENTIALS_USER.PASSWORD=${{ secrets.PROD_USER_PASSWORD }}" >> .env
          echo "AUTH_CREDENTIALS.EMAIL=${{ secrets.PROD_SUPER_ADMIN_EMAIL }}" >> .env
          echo "AUTH_CREDENTIALS.PASSWORD=${{ secrets.PROD_SUPER_ADMIN_PASSWORD }}" >> .env

      - name: Create .env (onprem)
        if: env.ENVIRONMENT == 'onprem'
        run: |
          echo "ENVIRONMENT=on_premise" >> .env
          echo "API_HTTP_CLIENT.URL=${{ secrets.ONPREM_API_URL }}" >> .env
          echo "API_HTTP_CLIENT.TIMEOUT=60" >> .env
          echo "ORG_NAME=${{ secrets.ONPREM_ORG_NAME }}" >> .env
          echo "AUTH_CREDENTIALS_SUPER_ADMIN.EMAIL=${{ secrets.ONPREM_SUPER_ADMIN_EMAIL }}" >> .env
          echo "AUTH_CREDENTIALS_SUPER_ADMIN.PASSWORD=${{ secrets.ONPREM_SUPER_ADMIN_PASSWORD }}" >> .env
          echo "AUTH_CREDENTIALS_ADMIN.EMAIL=${{ secrets.ONPREM_ADMIN_EMAIL }}" >> .env
          echo "AUTH_CREDENTIALS_ADMIN.PASSWORD=${{ secrets.ONPREM_ADMIN_PASSWORD }}" >> .env
          echo "AUTH_CREDENTIALS_USER.EMAIL=${{ secrets.ONPREM_USER_EMAIL }}" >> .env
          echo "AUTH_CREDENTIALS_USER.PASSWORD=${{ secrets.ONPREM_USER_PASSWORD }}" >> .env
          echo "AUTH_CREDENTIALS.EMAIL=${{ secrets.ONPREM_SUPER_ADMIN_EMAIL }}" >> .env
          echo "AUTH_CREDENTIALS.PASSWORD=${{ secrets.ONPREM_SUPER_ADMIN_PASSWORD }}" >> .env

      - name: Run API tests
        run: |
          MARKER="${{ github.event.inputs.marker || 'integration' }}"
          python -m pytest tests/api/ \
            -m "$MARKER" \
            --alluredir=allure-results \
            --tb=short \
            --junitxml=pytest-results.xml \
            -q

      - name: Generate environment.properties
        if: always()
        run: |
          mkdir -p allure-results
          cat > allure-results/environment.properties <<EOF
          ENVIRONMENT=${{ env.ENVIRONMENT }}
          BRANCH=${{ github.ref_name }}
          COMMIT_ID=${{ github.sha }}
          COMMIT_MESSAGE=${{ github.event.head_commit.message || 'manual run' }}
          EOF

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results
          path: pytest-results.xml

  publish-report:
    name: Publish Allure Report
    if: always()
    needs: [run-tests]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Install Allure CLI
        run: npm install -g allure-commandline

      - name: Generate Allure report
        run: allure generate allure-results -o allure-report --clean

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report

  testmo:
    name: Submit to Testmo
    if: ${{ github.event.inputs.enable_testmo == 'true' }}
    needs: [run-tests]
    runs-on: ubuntu-latest

    steps:
      - name: Download JUnit results
        uses: actions/download-artifact@v4
        with:
          name: junit-results

      - name: Install Testmo CLI
        run: npm install -g @testmo/testmo-cli

      - name: Submit to Testmo
        run: |
          testmo automation:run:submit \
            --instance "https://kaleidoo.testmo.net" \
            --project-id 1 \
            --name "API Tests — ${{ github.event.inputs.environment || 'qa' }}" \
            --source "api-${{ github.event.inputs.environment || 'qa' }}" \
            --results pytest-results.xml
        env:
          TESTMO_API_KEY: ${{ secrets.TESTMO_API_KEY }}
